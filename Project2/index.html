<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest's Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- navbar -->
    <div class="navbar">
        <div class="vertical-nav ">
            <i class="fa-brands fa-pinterest border" style="color: rgb(237, 15, 15);"></i>
            <div class="nav-icon">
             <i class="fa-solid fa-house-user border"></i>
             <i class="fa-brands fa-trello border"></i>
             <i class="fa-solid fa-square-plus border"></i>
             <i class="fa-solid fa-bell border"></i>
             <i class="fa-solid fa-comment-dots border"></i>
            </div>
            <i class="fa-solid fa-gear border"></i>
        </div>
    </div>    

    <!--header-->
    <header>
        <div class="search">
            <div class="search1 border2">
               <i class="fa-brands fa-sistrix"></i>
               <input placeholder="Search">
               <div class="media">
                  <i class="fa-regular fa-camera border"></i>
                  <i class="fa-solid fa-microphone border"></i>
               </div>
            </div>
            <div class="image">
                 <a href="https://github.com/dewa43-karki"><img src="dewa43.png"></a>
            </div>
        </div>
    </header>
</body>
</html>
